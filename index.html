<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Georgian:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { background: rgba(0,0,0,0.8); display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; color: white; font-family: 'Noto Sans Georgian', sans-serif; }
        .auth-container { background: #1a1a1a; padding: 40px; border-radius: 15px; border-top: 5px solid #ed1c24; text-align: center; width: 300px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        h2 { color: #ed1c24; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 2px; }
        input { display: block; margin: 15px auto; padding: 12px; width: 90%; border-radius: 5px; border: 1px solid #333; background: #222; color: white; font-family: 'Noto Sans Georgian', sans-serif; }
        button { background: #ed1c24; color: white; padding: 12px; width: 100%; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; transition: 0.3s; font-family: 'Noto Sans Georgian', sans-serif; }
        button:hover { background: #fff; color: #ed1c24; }
    </style>
</head>
<body>
    <div class="auth-container">
        <h2>ავტორიზაცია</h2>
        <input type="text" id="user" placeholder="მომხმარებელი">
        <input type="password" id="pass" placeholder="პაროლი">
        <button onclick="sendLogin()">შესვლა</button>
    </div>

    <script>
        function sendLogin() {
            const password = document.getElementById('pass').value;
            // ეს აგზავნის ინფორმაციას Pawn-ში
            if(typeof mp !== 'undefined') {
                CefEmit("onLoginAttempt", password);
            } else {
                console.log("პაროლი:", password); // ბრაუზერში ტესტისთვის
            }
        }
    </script>
</body>
</html>
